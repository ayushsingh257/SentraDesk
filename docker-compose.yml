version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ccgp_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ccgp_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ccgp_secure_password_2026}
      POSTGRES_DB: ${POSTGRES_DB:-ccgp_governance}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ccgp_admin} -d ${POSTGRES_DB:-ccgp_governance}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ccgp_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ccgp_minio
    restart: always
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio_admin_user}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_admin_secret_key_2026}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.3
    container_name: ccgp_qdrant
    restart: always
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ccgp_backend
    restart: always
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ccgp_admin}:${POSTGRES_PASSWORD:-ccgp_secure_password_2026}@db:5432/${POSTGRES_DB:-ccgp_governance}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minio_admin_user}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minio_admin_secret_key_2026}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-ccgp-evidence}
      - MINIO_SECURE=false
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET_is_required_in_env_file}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-["http://localhost:3000","http://127.0.0.1:3000"]}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: ccgp_frontend
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ccgp_celery
    restart: always
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ccgp_admin}:${POSTGRES_PASSWORD:-ccgp_secure_password_2026}@db:5432/${POSTGRES_DB:-ccgp_governance}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minio_admin_user}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minio_admin_secret_key_2026}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-ccgp-evidence}
      - MINIO_SECURE=false
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET_is_required_in_env_file}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-alerts.ccgp@example.com}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-gmail_application_password}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-alerts.ccgp@example.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ccgp_celery_beat
    restart: always
    command: celery -A app.core.celery_app beat --loglevel=info
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ccgp_admin}:${POSTGRES_PASSWORD:-ccgp_secure_password_2026}@db:5432/${POSTGRES_DB:-ccgp_governance}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minio_admin_user}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minio_admin_secret_key_2026}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-ccgp-evidence}
      - MINIO_SECURE=false
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET_is_required_in_env_file}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: ccgp_nginx
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend


  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ccgp_prometheus
    restart: always
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:10.4.0
    container_name: ccgp_grafana
    restart: always
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-ccgp_grafana_2026}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafanadata:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
  miniodata:
  qdrantdata:
  prometheusdata:
  grafanadata:

