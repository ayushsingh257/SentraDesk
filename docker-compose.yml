version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ccgp_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ccgp_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ccgp_secure_password_2026}
      POSTGRES_DB: ${POSTGRES_DB:-ccgp_governance}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ccgp_admin} -d ${POSTGRES_DB:-ccgp_governance}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ccgp_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ccgp_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio_admin_user}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_admin_secret_key_2026}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.3
    container_name: ccgp_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ccgp_backend
    restart: always
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ccgp_admin}:${POSTGRES_PASSWORD:-ccgp_secure_password_2026}@db:5432/${POSTGRES_DB:-ccgp_governance}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minio_admin_user}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minio_admin_secret_key_2026}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-ccgp-evidence}
      - MINIO_SECURE=false
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_signing_key_for_development_purposes_only_change_in_production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ccgp_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  miniodata:
  qdrantdata:
