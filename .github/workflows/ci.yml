name: CCGP CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ccgp_admin
          POSTGRES_PASSWORD: ccgp_secure_password_2026
          POSTGRES_DB: ccgp_governance
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Pytest suite
      env:
        DATABASE_URL: postgresql://ccgp_admin:ccgp_secure_password_2026@localhost:5432/ccgp_governance
        REDIS_URL: redis://localhost:6379/0
        JWT_SECRET: super_secret_jwt_signing_key_for_development_purposes_only_change_in_production
      run: |
        cd backend
        python -m pytest

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package.json

    - name: Install npm dependencies
      run: |
        cd frontend
        npm ci

    - name: Build Next.js project
      run: |
        cd frontend
        npm run build
