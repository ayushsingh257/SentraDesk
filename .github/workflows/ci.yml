name: CCGP CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    name: Backend Tests & Linting
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ccgp_admin
          POSTGRES_PASSWORD: ccgp_secure_password_2026
          POSTGRES_DB: ccgp_governance
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.9.3
        ports:
          - 6333:6333
      minio:
        image: minio/minio:RELEASE.2024-03-07T00-43-48Z
        ports:

          - 9000:9000
          - 9001:9001
        env:
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
        entrypoint: minio
        command: server /data --console-address :9001




    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run pip-audit
      run: |
        pip install pip-audit
        pip-audit -r backend/requirements.txt --local --format=columns

    - name: Run Semgrep scan
      run: |
        pip install semgrep
        semgrep scan --config auto --error --exclude=tests

    - name: Wait for services (Qdrant & MinIO) to be healthy
      run: |
        echo "Waiting for Qdrant..."
        for i in {1..30}; do
          if curl -s http://localhost:6333/healthz; then
            echo "Qdrant is ready!"
            break
          fi
          sleep 1
        done
        echo "Waiting for MinIO..."
        for i in {1..30}; do
          if curl -s http://localhost:9000/minio/health/live; then
            echo "MinIO is ready!"
            exit 0
          fi
          sleep 1
        done
        echo "Services failed to start"
        exit 1


    - name: Run Pytest suite
      env:
        DATABASE_URL: postgresql://ccgp_admin:ccgp_secure_password_2026@localhost:5432/ccgp_governance
        REDIS_URL: redis://localhost:6379/0
        REDIS_HOST: localhost
        REDIS_PORT: "6379"
        JWT_SECRET: super_secret_jwt_signing_key_for_development_purposes_only_change_in_production
        QDRANT_HOST: localhost
        QDRANT_PORT: "6333"
        QDRANT_URL: http://localhost:6333
        MINIO_ENDPOINT: localhost:9000
        MINIO_ACCESS_KEY: minioadmin
        MINIO_SECRET_KEY: minioadmin
        MINIO_BUCKET_NAME: ccgp-evidence
        MLFLOW_TRACKING_URI: sqlite:///mlflow_ci.db
        ENVIRONMENT: testing
      run: |
        cd backend
        python -m pytest -v --tb=short

  frontend-build:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v7
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install npm dependencies
      run: |
        cd frontend
        npm ci --prefer-offline

    - name: Run npm audit
      run: |
        cd frontend
        npm audit --audit-level=high

    - name: Lint check
      run: |
        cd frontend
        npm run lint


    - name: Build Next.js project
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8000
      run: |
        cd frontend
        npm run build

  docker-compose-validate:
    name: Docker Compose Config Validation
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci_validation_secret_placeholder
    steps:
    - uses: actions/checkout@v4

    - name: Validate Docker Compose syntax
      run: |
        docker compose config --quiet

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        ignore-unfixed: true
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'

