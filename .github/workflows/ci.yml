name: CCGP CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    name: Backend Tests & Linting
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ccgp_admin
          POSTGRES_PASSWORD: ccgp_secure_password_2026
          POSTGRES_DB: ccgp_governance
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Pytest suite
      env:
        DATABASE_URL: postgresql://ccgp_admin:ccgp_secure_password_2026@localhost:5432/ccgp_governance
        REDIS_URL: redis://localhost:6379/0
        JWT_SECRET: super_secret_jwt_signing_key_for_development_purposes_only_change_in_production
      run: |
        cd backend
        python -m pytest -v --tb=short

  frontend-build:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install npm dependencies
      run: |
        cd frontend
        npm ci --prefer-offline

    - name: Lint check
      run: |
        cd frontend
        npm run lint || true

    - name: Build Next.js project
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8000
      run: |
        cd frontend
        npm run build

  docker-compose-validate:
    name: Docker Compose Config Validation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Validate Docker Compose syntax
      run: |
        docker compose config --quiet
